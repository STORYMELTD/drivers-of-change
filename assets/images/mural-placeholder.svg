  <text x="6150"  y="200" text-anchor="middle" fill="rgba(76,175,130,0.5)" font-family="Georgia,serif" font-size="80">Chapter 2</text>
  <text x="8775"  y="200" text-anchor="middle" fill="rgba(76,175,130,0.5)" font-family="Georgia,serif" font-size="80">Chapter 3</text>
  <text x="11325" y="200" text-anchor="middle" fill="rgba(76,175,130,0.5)" font-family="Georgia,serif" font-size="80">Chapter 4</text>
  <text x="13800" y="200" text-anchor="middle" fill="rgba(76,175,130,0.5)" font-family="Georgia,serif" font-size="80">Chapter 5</text>

