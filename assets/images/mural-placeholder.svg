    <rect x="1000"  y="1080" width="90"  height="320"/>
    <rect x="2500"  y="1060" width="100" height="340"/>
    <rect x="2700"  y="1020" width="140" height="380"/>
    <rect x="5000"  y="1070" width="110" height="330"/>
    <rect x="5300"  y="1040" width="80"  height="360"/>
    <rect x="7500"  y="1055" width="130" height="345"/>
    <rect x="7800"  y="1025" width="90"  height="375"/>
    <rect x="10200" y="1060" width="120" height="340"/>
