<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 15000 1900" width="15000" height="1900">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1A3A2A"/>
      <stop offset="20%"  stop-color="#2D5A3D"/>
      <stop offset="40%"  stop-color="#1E4A2E"/>
      <stop offset="60%"  stop-color="#3D6B4A"/>
      <stop offset="80%"  stop-color="#2A5C3E"/>
      <stop offset="100%" stop-color="#1A3A2A"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4A3520"/>
      <stop offset="30%"  stop-color="#5C4A2A"/>
      <stop offset="60%"  stop-color="#4A3520"/>
      <stop offset="100%" stop-color="#3D2A18"/>
    </linearGradient>
  </defs>

  <!-- Sky gradient background -->
  <rect width="15000" height="1400" fill="url(#sky)"/>
  <!-- Ground -->
  <rect y="1400" width="15000" height="500" fill="url(#ground)"/>

  <!-- Chapter dividers -->
  <line x1="2250"  y1="0" x2="2250"  y2="1900" stroke="rgba(76,175,130,0.15)" stroke-width="2" stroke-dasharray="20,10"/>
  <line x1="4800"  y1="0" x2="4800"  y2="1900" stroke="rgba(76,175,130,0.15)" stroke-width="2" stroke-dasharray="20,10"/>
  <line x1="7500"  y1="0" x2="7500"  y2="1900" stroke="rgba(76,175,130,0.15)" stroke-width="2" stroke-dasharray="20,10"/>
  <line x1="10050" y1="0" x2="10050" y2="1900" stroke="rgba(76,175,130,0.15)" stroke-width="2" stroke-dasharray="20,10"/>
  <line x1="12600" y1="0" x2="12600" y2="1900" stroke="rgba(76,175,130,0.15)" stroke-width="2" stroke-dasharray="20,10"/>

  <!-- Chapter labels -->
  <text x="1125"  y="200" text-anchor="middle" fill="rgba(76,175,130,0.5)" font-family="Georgia,serif" font-size="80">Prologue</text>
