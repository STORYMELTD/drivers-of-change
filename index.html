<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Drivers of Change — A journey through East Jerusalem"/>
  <title>Drivers of Change</title>
  <link rel="stylesheet" href="css/main.css"/>
</head>
<body>

  <!-- ═══════════════════════════════
       SCREEN 1 — LOADING
  ═══════════════════════════════ -->
  <div id="loader">
    <img class="loader__bg" src="assets/images/Loading page bg.jpg" alt=""/>
    <div class="loader__center">
      <div class="loader__gear-wrap">
        <img class="loader__gear" src="assets/images/gear.png" alt=""/>
        <span class="loader__pct" id="loaderPct">0%</span>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════
       SCREEN 2 — LANDING
  ═══════════════════════════════ -->
  <section id="landing">
    <!-- Full landing design image (contains title, layout, typography) -->
    <img class="landing__design" src="assets/images/title page - landing.png" alt="Drivers of Change"/>
    <!-- Mural cityscape that appears behind the design -->
    <img class="landing__quds" src="assets/images/home quds.png" alt=""/>
    <!-- Logos -->
    <img class="landing__logos" src="assets/images/logos.png" alt="Pengon · EU · Overseas"/>
    <!-- Gear on landing track -->
    <div class="landing__track-wrap">
      <img class="landing__track" src="assets/images/gear track home-01.png" alt=""/>
      <img class="landing__gear" id="landingGear" src="assets/images/gear.png" alt=""/>
    </div>
    <!-- CTA -->
    <button id="driveBtn" class="drive-btn">
      <span>Drive Through</span>
    </button>
  </section>

  <!-- ═══════════════════════════════
       SCREEN 3 — BAB AL-AMOUD
  ═══════════════════════════════ -->
  <section id="babSection">
    <div class="bab__scene">
      <img class="bab__img" id="babImg" src="assets/images/bab alamoud-01.png" alt="Bab al-Amoud — Damascus Gate, Jerusalem"/>
    </div>
    <p class="bab__hint">Scroll to enter</p>
  </section>

  <!-- ═══════════════════════════════
       SCREEN 4 — THE MURAL JOURNEY
  ═══════════════════════════════ -->
  <main id="storyStage">

    <!-- Sticky viewport -->
    <div id="muralTrack" class="mural-track">

      <!-- Everything that moves horizontally lives here -->
      <div id="muralWrap" class="mural-wrap">

        <!-- Base mural -->
        <img
          id="muralImg"
          class="mural-img"
          src="assets/images/DoC-Layers/%D8%A7%D9%84%D9%84%D9%88%D8%AD%D8%A9%20%D9%83%D8%A7%D9%85%D9%84%D8%A9.jpg"
          alt="Drivers of Change — East Jerusalem mural"
          draggable="false"
        />

        <!-- Parallax layers stacked over mural -->
        <div id="muralLayers" class="mural-layers"></div>

        <!-- Gear rolling on track -->
        <div id="gearSystem" class="gear-system">
          <img id="muralTrackImg" class="mural-track-img" src="assets/images/gear track long-01.png" alt=""/>
          <img id="muralGear"     class="mural-gear"      src="assets/images/gear.png" alt=""/>
        </div>

        <!-- Chapter text boxes (5 chapters) -->
        <div id="chapters" class="chapters"></div>

        <!-- Hotspots -->
        <div id="hotspots" class="hotspots"></div>

      </div><!-- /muralWrap -->
    </div><!-- /muralTrack -->

  </main>

  <!-- ═══════════════════════════════
       CHAPTER PANEL (slide-in)
  ═══════════════════════════════ -->
  <aside id="hotspotPanel" class="hotspot-panel" aria-hidden="true">
    <button class="panel-close" id="closePanel">
      <img src="assets/images/X.svg" alt="Close"/>
    </button>
    <div class="panel-content" id="panelContent"></div>
  </aside>

  <!-- Navigation bar -->
  <nav id="storyNav" class="story-nav">
    <div class="story-nav__inner">
      <div class="story-nav__dots" id="navDots"></div>
      <div class="story-nav__progress">
        <div class="story-nav__fill" id="progressFill"></div>
      </div>
      <span class="story-nav__label" id="chapterLabel"></span>
    </div>
  </nav>

  <!-- Audio toggle -->
  <button id="audioToggle" class="audio-toggle">
    <svg class="ico-sound-on"  viewBox="0 0 24 24" fill="none"><path d="M11 5L6 9H2v6h4l5 4V5z" stroke="currentColor" stroke-width="2"/><path d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    <svg class="ico-sound-off" viewBox="0 0 24 24" fill="none" style="display:none"><path d="M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6M17 9l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </button>

  <audio id="ambientAudio" loop preload="none"></audio>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>

  <script src="js/story-data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
