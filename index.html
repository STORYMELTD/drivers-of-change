<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Drivers of Change — A journey through East Jerusalem"/>
  <title>Drivers of Change</title>
  <!-- Ubuntu font from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/main.css?v=17"/>
</head>
<body>

  <!-- ═══════════════════════════════
       SCREEN 1 — LOADING
  ═══════════════════════════════ -->
  <div id="loader">
    <img class="loader__bg" src="assets/images/Loading page bg.jpg" alt=""/>
    <div id="loaderGearWrap" class="loader__gear-wrap">
      <img id="loaderGear" class="loader__gear" src="assets/images/gear.png" alt=""/>
      <span id="loaderPct" class="loader__pct">0%</span>
    </div>
  </div>

  <!-- ═══════════════════════════════
       SCREEN 2 — LANDING
  ═══════════════════════════════ -->
  <section id="landing">

    <!-- Background -->
    <img class="landing__bg" src="assets/images/Loading page bg.jpg" alt=""/>

    <!-- City mural behind everything -->
    <img class="landing__quds" src="assets/images/home quds.png" alt=""/>

    <!-- Main gear — 100%, slow rotation, drop shadow -->
    <div class="landing__gear-wrap">
      <img id="landingGear" class="landing__gear" src="assets/images/gear.png" alt=""/>
    </div>

    <!-- Angled leader line (emerges from gear at 45deg, then horizontal) + subtitle -->
    <div class="landing__subtitle-wrap">
      <svg class="landing__leader" viewBox="0 0 480 90" aria-hidden="true">
        <path class="landing__leader-line" d="M2,86 L44,44 L474,44" fill="none"
              stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle class="landing__leader-dot" cx="474" cy="44" r="4.5" fill="#fff"/>
      </svg>
      <p class="landing__subtitle">Youth-Led Climate Futures in Jerusalem</p>
    </div>

    <!-- Main title -->
    <div class="landing__title-wrap">
      <h1 class="landing__title">
        <span class="landing__title-line1">Drivers of</span>
        <span class="landing__title-line2">Change</span>
      </h1>
    </div>

    <!-- Logos -->
    <img class="landing__logos" src="assets/images/logos.png" alt="Pengon · EU · Overseas"/>

    <!-- Bottom tented track + CTA -->
    <div class="landing__bottom">
      <img class="landing__track" src="assets/images/gear track home-01.png" alt=""/>
      <button id="driveBtn" class="drive-btn">Drive Through</button>
    </div>

  </section>

  <!-- ═══════════════════════════════
       SCREEN 3 — BAB AL-AMOUD
  ═══════════════════════════════ -->
  <section id="babSection">
    <div class="bab__wrap">
      <img id="babImg" class="bab__img" src="assets/images/bab alamoud-01.png" alt="Bab al-Amoud — Damascus Gate, Jerusalem"/>
    </div>
    <!-- Dented track across the bottom — tiled like the mural (reuses long track asset) -->
    <div class="bab__track"></div>
    <div class="bab__hint">
      <span>Scroll to enter</span>
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12l7 7 7-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
  </section>

  <!-- ═══════════════════════════════
       PERSISTENT DRIVER (gear) — fixed overlay above bab + mural.
       #muralGear is RELOCATED into here for the bab→mural bridge (single node).
  ═══════════════════════════════ -->
  <div id="driverLayer" class="driver-layer"></div>

  <!-- ═══════════════════════════════
       SCREEN 4 — THE MURAL JOURNEY
  ═══════════════════════════════ -->
  <main id="storyStage">
    <div id="muralViewport" class="mural-viewport">
      <div id="muralWrap" class="mural-wrap">

        <!-- Base mural (full composite) -->
        <img
          id="muralImg"
          class="mural-img"
          src="assets/images/DoC mural no gear.jpg"
          alt="Drivers of Change mural"
          draggable="false"
        />

        <!-- Individual layers — assembled from layer map (tomorrow) -->
        <div id="muralLayers" class="mural-layers"></div>

        <!-- Chapter text boxes -->
        <div id="chaptersEl" class="chapters-wrap"></div>

        <!-- Hotspots -->
        <div id="hotspotsEl" class="hotspots-wrap"></div>

        <!-- Gear + track system — sits at bottom of mural -->
        <div id="gearSystem" class="gear-system">
          <div id="trackWrap" class="track-wrap">
            <!-- Track rendered as repeating canvas in JS -->
            <canvas id="trackCanvas" class="track-canvas"></canvas>
          </div>
          <img id="muralGear" class="mural-gear" src="assets/images/gear.png" alt=""/>
        </div>

      </div>
    </div>
  </main>

  <!-- ═══════════════════════════════
       HOTSPOT SIDE PANEL
  ═══════════════════════════════ -->
  <aside id="hotspotPanel" class="hotspot-panel" aria-hidden="true">
    <button class="panel-close" id="closePanel">
      <img src="assets/images/X.svg" alt="Close"/>
    </button>
    <div class="panel-content" id="panelContent"></div>
  </aside>

  <!-- Navigation -->
  <nav id="storyNav" class="story-nav">
    <div class="story-nav__inner">
      <div id="navDots" class="nav-dots"></div>
      <div class="nav-progress">
        <div id="progressFill" class="nav-progress__fill"></div>
      </div>
      <span id="chapterLabel" class="nav-label"></span>
    </div>
  </nav>

  <!-- Audio -->
  <button id="audioToggle" class="audio-toggle" aria-label="Toggle sound">
    <svg class="ico-on"  viewBox="0 0 24 24" fill="none"><path d="M11 5L6 9H2v6h4l5 4V5z" stroke="currentColor" stroke-width="2"/><path d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    <svg class="ico-off" viewBox="0 0 24 24" fill="none" style="display:none"><path d="M11 5L6 9H2v6h4l5 4V5zM23 9l-6 6M17 9l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </button>
  <audio id="ambientAudio" loop preload="none"></audio>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>
  <script src="js/story-data.js?v=17"></script>
  <script src="js/main.js?v=17"></script>
</body>
</html>
